name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-13
            name: darwin-amd64
          - os: macos-latest
            name: darwin-arm64
          - os: windows-latest
            name: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Build binary
        shell: bash
        run: |
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" \
            -o "cryexc-history-${{ matrix.name }}${EXT}" ./cmd/server
          ls -lh "cryexc-history-${{ matrix.name }}${EXT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryexc-history-${{ matrix.name }}
          path: cryexc-history-${{ matrix.name }}*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
